# vibi-adobe-plugin server — Oracle Cloud Always Free (ARM Ampere A1) 배포.
# vibi-bff 와 완전히 별개의 VM/스택. 같은 패턴(상시기동·TLS·재시작)을 여기서 독립 wire.
#
#   server : Hono(Node+tsx) 앱. 호스트에 포트 노출 안 함(expose 만) — Caddy 만 접근.
#   caddy  : 80/443 종단, Let's Encrypt 자동 TLS, server:8787 로 리버스 프록시.
#
# 둘 다 restart: always → reboot/크래시/회수 후 재기동 시 자동 복구
# (Always Free 회수 자체는 PAYG 전환으로 방지 — README 참고).
#
# 기동:  docker compose up -d --build
# 로그:  docker compose logs -f server
# 갱신:  git pull && docker compose up -d --build

services:
  server:
    # ARM VM 에서 직접 빌드 (cross-arch 헤더에이크 없음). context = server/ 루트.
    build:
      context: ../..
      dockerfile: Dockerfile
    image: vibi-plugin-server:local
    env_file:
      - ./plugin.env
    # plugin.env 보다 우선 — Oracle VM 고정값. 로컬 dev .env 와 충돌 안 나게 여기서 못박음.
    environment:
      NODE_ENV: production
      PORT: "8787"
      STEM_DIR: /tmp/stems
      PERSO_API_BASE: https://api.perso.ai
      PERSO_STORAGE_BASE: https://portal-media.perso.ai
    expose:
      - "8787"          # 호스트 미노출 — caddy 컨테이너 네트워크에서만 도달
    restart: always
    # STEM_DIR — Perso stem 다운로드/믹스용 임시 작업 버퍼. cleanup sweep 이 TTL 후 정리.
    tmpfs:
      - /tmp/stems
    # /healthz 로 준비 확인. slim 이미지엔 curl/wget 이 없으므로 node 내장 fetch(전역) 사용.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    # Caddyfile 의 {$ACME_EMAIL} 치환용. plugin.env 의 ACME_EMAIL 만 참조 (나머지 키는 caddy 가 무시).
    env_file:
      - ./plugin.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # 발급받은 인증서 영속 — 재기동해도 ACME rate limit 안 침
      - caddy_config:/config
    restart: always
    # server 가 healthy 가 된 뒤에 뜸 — 첫 부팅 시 502 윈도우 최소화.
    depends_on:
      server:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
